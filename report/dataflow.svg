<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <style>
      text { font-family: Consolas, "Courier New", monospace; }
      .title { font-size: 14px; font-weight: bold; fill: #333; }
      .box-label { font-size: 11px; font-weight: bold; fill: #FFF; }
      .box-sublabel { font-size: 9px; fill: #E0E0E0; }
      .node-label { font-size: 10px; fill: #333; text-anchor: middle; }
      .edge-label { font-size: 9px; fill: #777; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555" />
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#306998" />
    </marker>
    <!-- Box shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" class="title">jsonschema-rs 数据流与验证流程</text>

  <!-- ====== TOP ROW: Inputs ====== -->

  <!-- Schema JSON -->
  <rect x="50" y="50" width="160" height="60" rx="8" fill="#306998" filter="url(#shadow)"/>
  <text x="130" y="73" text-anchor="middle" class="box-label">Schema JSON 文件</text>
  <text x="130" y="90" text-anchor="middle" class="box-sublabel">（验证规则定义）</text>

  <!-- Instance JSON -->
  <rect x="590" y="50" width="160" height="60" rx="8" fill="#306998" filter="url(#shadow)"/>
  <text x="670" y="73" text-anchor="middle" class="box-label">Instance JSON 文件</text>
  <text x="670" y="90" text-anchor="middle" class="box-sublabel">（待验证数据）</text>

  <!-- Schema → SchemaRegistry -->
  <line x1="130" y1="110" x2="130" y2="148" stroke="#306998" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="140" y="133" class="edge-label" fill="#306998">$ref 解析</text>

  <!-- ====== MID LEFT: SchemaRegistry → compiler.rs → Validator ====== -->

  <!-- SchemaRegistry -->
  <rect x="45" y="150" width="170" height="50" rx="6" fill="#2E86C1" filter="url(#shadow)"/>
  <text x="130" y="170" text-anchor="middle" class="box-label">SchemaRegistry</text>
  <text x="130" y="186" text-anchor="middle" class="box-sublabel">$id → 文档映射 + JSON Pointer</text>

  <line x1="130" y1="200" x2="130" y2="238" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- compiler.rs -->
  <rect x="45" y="240" width="170" height="65" rx="6" fill="#2E86C1" filter="url(#shadow)"/>
  <text x="130" y="260" text-anchor="middle" class="box-label">compiler.rs</text>
  <text x="130" y="276" text-anchor="middle" class="box-sublabel">• 预编译 pattern → Regex</text>
  <text x="130" y="292" text-anchor="middle" class="box-sublabel">• 构建 Validator 实例</text>

  <line x1="130" y1="305" x2="130" y2="343" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Validator -->
  <rect x="30" y="345" width="200" height="50" rx="6" fill="#1A5276" filter="url(#shadow)"/>
  <text x="130" y="365" text-anchor="middle" class="box-label">Validator</text>
  <text x="130" y="381" text-anchor="middle" class="box-sublabel">（持有预编译 schema 的 Arc 引用）</text>

  <!-- ====== CENTER: ValidationContext ====== -->

  <!-- compile → Validator, Instance → Validator -->
  <line x1="230" y1="370" x2="358" y2="370" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Instruction arrow from Instance to ValidationContext -->
  <line x1="670" y1="110" x2="670" y2="200" stroke="#306998" stroke-width="2"/>
  <line x1="670" y1="200" x2="530" y2="200" stroke="#306998" stroke-width="2"/>
  <line x1="530" y1="200" x2="530" y2="370" stroke="#306998" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ValidationContext -->
  <rect x="360" y="340" width="340" height="70" rx="8" fill="#27AE60" filter="url(#shadow)"/>
  <text x="530" y="360" text-anchor="middle" class="box-label" font-size="12">ValidationContext（递归验证引擎）</text>
  <text x="530" y="378" text-anchor="middle" class="box-sublabel">iter_errors() / descend() / resolve_ref()</text>
  <text x="530" y="394" text-anchor="middle" class="box-sublabel">instance_path + schema_path 追踪 · 循环引用检测 · 类型守卫</text>

  <!-- ====== BOTTOM: Keyword modules ====== -->

  <line x1="530" y1="410" x2="530" y2="438" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Keyword dispatch box -->
  <rect x="100" y="440" width="600" height="55" rx="8" fill="#F39C12" filter="url(#shadow)"/>
  <text x="400" y="460" text-anchor="middle" class="box-label" font-size="12">keyword::mod — Keyword trait 分发</text>
  <text x="400" y="478" text-anchor="middle" class="box-sublabel">assertions · numeric · string · format · objects · arrays · applicator  (共 34 关键字 · 7 模块)</text>

  <!-- Output arrows -->
  <line x1="300" y1="495" x2="300" y2="510" stroke="#27AE60" stroke-width="2"/>
  <text x="300" y="520" text-anchor="middle" class="node-label" fill="#27AE60" font-size="9">Vec&lt;ValidationError&gt;</text>

  <line x1="500" y1="495" x2="500" y2="510" stroke="#27AE60" stroke-width="2"/>
  <text x="500" y="520" text-anchor="middle" class="node-label" fill="#27AE60" font-size="9">error.rs 格式化</text>

  <line x1="650" y1="495" x2="650" y2="510" stroke="#27AE60" stroke-width="2"/>
  <text x="650" y="520" text-anchor="middle" class="node-label" fill="#27AE60" font-size="9">CLI 输出 / API 返回</text>
</svg>
